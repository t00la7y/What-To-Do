<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="description" content="to-do-list" />
  <meta name="author" content="Mpilo Shezi ( t00la7y )" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="keywords" content="to-do list, task manager, productivity, JavaScript, HTML, CSS" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="icon" href="images/notepad.png" type="image/png" />
  <script src="main.js" defer></script>
  <link rel="stylesheet" href="style.css" />
  <title>What-To-Do</title>
</head>

<body>
  <header>
    <div class="header">
      <h2>What-To-Do<img src="images/icon.png" alt="icon"></h2>
      <span class="material-symbols-outlined data-theme" id="theme-toggle" class="switch">
        table_lamp
      </span>
    </div>
  </header>
  <main>
    <section class="todo-app">
      <div class="menu">
        <ul class="menu-list">
          <li><span id="search-query"><input type="text" placeholder="Search..." /><span
                class="material-symbols-outlined">
                person_add
              </span></span></li>
          <li id="to-do-lists">List</li>
          <hr>
          <li id="shared-List">Collabs</li>
          <li id="recently-Done">Recently Done</li>
          <li id="urgent-Task">Urgent Tasks</li>
          <hr>
          <li id="settings">Settings</li>
        </ul>
      </div>
      <div class="workspace">
        <div class="row">
          <input type="text" id="input-box" placeholder="Add your text" aria-label="task Input">
          <button onclick="addTask()" aria-label="Add Task">Add</button>
        </div>
        <div class="list-type">
          <span class="tag" id="untitled">Untitled</span>
          <span class="tag" id="personal">Personal</span>
          <span class="tag" id="work">Work</span>
          <span class="tag" id="shared">Shared</span>
          <span class="tag" id="recent">Recent</span>
          <span class="tag" id="urgent">Urgent</span>
          <span class="add-tag">+</span>
        </div>
        <hr>
        <div class="tab-window">
          <div class="tab-header">
            <ul id="tab-header-list"></ul>
          </div>
          <div class="tab-content">
            <ul id="list-container"></ul>
          </div>
        </div>
    </section>
  </main>
</body>

</html>
