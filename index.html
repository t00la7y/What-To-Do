<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="description" content="to-do-list" />
  <meta name="author" content="Mpilo Shezi ( t00la7y )" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="keywords" content="to-do list, task manager, productivity, JavaScript, HTML, CSS" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="icon" href="images/notepad.png" type="image/png" />

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <!-- Component Stylesheets -->
  <link rel="stylesheet" href="css/components/toast.css" />
  <link rel="stylesheet" href="css/components/style.css" />

  <!-- Service Scripts -->
  <script src="js/services/storageService.js" defer></script>
  <script src="js/services/themeService.js" defer></script>

  <!-- Utility Scripts -->
  <script src="js/utils/helpers.js" defer></script>

  <!-- Component Scripts -->
  <script src="js/components/TagComponent.js" defer></script>
  <script src="js/components/TaskComponent.js" defer></script>
  <script src="js/components/ToastComponent.js" defer></script>
  <script src="js/components/SearchComponent.js" defer></script>

  <!-- Main Application Script -->
  <script src="js/app.js" defer></script>
  <title>What-To-Do</title>
</head>

<body>
  <header>
    <div class="header">
      <h2>What-To-Do<img src="images/icon.png" alt="icon"></h2>
      <span class="material-symbols-outlined data-theme" id="theme-toggle" class="switch">
        table_lamp
      </span>
    </div>
  </header>
  <main>
    <section class="todo-app">
      <div class="menu">
        <span id="search-query"><input type="text" placeholder="Search..." /></span>
        <ul class="menu-list">
          <li id="home">home</li>
          <li id="shared-List">Shared</li>
          <li id="recently-Done">Recent</li>
          <li id="urgent-Task">Urgent</li>
          <li id="settings">Settings</li>
          <li id="user">User</li>
        </ul>
        <span id="tag-delete" class="material-symbols-outlined" title="Delete Tag" aria-label="Delete Tag">
          delete
        </span>
      </div>
      <div class="page-home">
        <div class="list-type">
          <span class="tag" id="untitled" draggable="true">Untitled</span>
          <span class="tag" id="personal" draggable="true">Personal</span>
          <span class="tag" id="work" draggable="true">Work</span>
          <span class="tag" id="shared" draggable="true">Shared</span>
          <span class="tag" id="recent" draggable="true">Recent</span>
          <span class="tag" id="urgent" draggable="true">Urgent</span>
          <span class="tag" id="addTag" draggable="false">+</span>
        </div>
        <div class="row">
          <input type="text" id="input-box" placeholder="Add your text" aria-label="task Input">
          <button onclick="addTask()" aria-label="Add Task">Add</button>
        </div>
        <div class="tag-content">
          <ul id="list-container"></ul>
        </div>
      </div>
      <div class="page-setting" hidden>
        <h3 style="color: var(--text);">Settings</h3>
        <div class="themes">
          <h2 style="color: var(--text);">Choose Themes</h2>
          <div class="light-themes">
            <button class="theme-btn" data-theme="black">Black</button>
            <button class="theme-btn" data-theme="blue">Blue</button>
            <button class="theme-btn" data-theme="gold">Gold</button>
            <button class="theme-btn" data-theme="green">Green</button>
            <button class="theme-btn" data-theme="orange">Orange</button>
            <button class="theme-btn" data-theme="purple">Purple</button>
            <button class="theme-btn" data-theme="red">Red</button>
          </div>
        </div>
        <div class="font-settings">
          <h2 style="color: var(--text);">Font Size</h2>
          <div class="font-settings-btns">
            <button id="page-setting-btn" onclick="setFontSize('small')">Small</button>
            <button id="page-setting-btn" onclick="setFontSize('medium')">Medium</button>
            <button id="page-setting-btn" onclick="setFontSize('large')">Large</button>
          </div>
        </div>
        <div class="data-settings">
          <h2 style="color: var(--text);">Data</h2>
          <div class="data-settings-btns">
            <button id="page-setting-btn" onclick="clearTasks()">Clear All Tasks</button>
            <button id="page-setting-btn" onclick="exportTasks()">Export Tasks</button>
          </div>
        </div>
      </div>
      <div class="page-user" hidden>
        <h2>User Profile</h2>
        <div class="user-info">
          <img id="profile-photo" src="images/default-avatar.png" alt="User Avatar" class="avatar">
          <form action="POST" id="user-form">
            <label for="username" style="color: var(--text);">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
            <br>
            <label for="email" style="color: var(--text);">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
            <br>
            <button type="submit">Log In</button>
            <button type="button">Sign Up</button>
            <input type="file" id="photo-upload" accept="image/*">
          </form>
        </div>
      </div>
    </section>
  </main>
  <footer>
    <h4>© 2026 What-To-Do. All rights reserved.</h4>
  </footer>
  <script>
  </script>
</body>

</html>
