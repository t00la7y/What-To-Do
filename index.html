<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="description" content="to-do-list" />
  <meta name="author" content="Mpilo Shezi ( t00la7y )" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="keywords" content="to-do list, task manager, productivity, JavaScript, HTML, CSS" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="icon" href="images/notepad.png" type="image/png" />
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css" />
  
  <!-- Component Stylesheets -->
  <link rel="stylesheet" href="css/components/toast.css" />
  <link rel="stylesheet" href="css/components/modal.css" />
  
  <!-- Service Scripts -->
  <script src="js/services/storageService.js" defer></script>
  <script src="js/services/themeService.js" defer></script>
  
  <!-- Utility Scripts -->
  <script src="js/utils/helpers.js" defer></script>
  
  <!-- Component Scripts -->
  <script src="js/components/TagComponent.js" defer></script>
  <script src="js/components/TaskComponent.js" defer></script>
  <script src="js/components/ToastComponent.js" defer></script>
  <script src="js/components/SearchComponent.js" defer></script>
  
  <!-- Main Application Script -->
  <script src="js/app.js" defer></script>
  
  <title>What-To-Do</title>
</head>

<body>
  <header>
    <div class="header">
      <h2 id="home">What-To-Do<img src="images/icon.png" alt="icon"></h2>
      <span class="material-symbols-outlined data-theme" id="theme-toggle" class="switch">
        table_lamp
      </span>
    </div>
  </header>
  <main>
    <section class="todo-app">
      <div class="menu">
        <span id="search-query"><input type="text" placeholder="Search..." /></span>
        <ul class="menu-list">
          <li id="to-do-lists">List</li>
          <li id="shared-List">Collabs</li>
          <li id="recently-Done">Recently Done</li>
          <li id="urgent-Task">Urgent Tasks</li>
          <li id="settings">Settings</li>
          <li id="user">User</li>
        </ul>
      </div>
      <div class="workspace">
        <div class="list-type">
          <span class="tag" id="untitled">Untitled</span>
          <span class="tag" id="personal">Personal</span>
          <span class="tag" id="work">Work</span>
          <span class="tag" id="shared">Shared</span>
          <span class="tag" id="recent">Recent</span>
          <span class="tag" id="urgent">Urgent</span>
          <span class="add-tag">+</span>
        </div>
        <div class="row">
          <input type="text" id="input-box" placeholder="Add your text" aria-label="task Input">
          <button onclick="addTask()" aria-label="Add Task">Add</button>
        </div>
        <div class="tag-content">
          <ul id="list-container"></ul>
        </div>
    </section>
  </main>
  <footer>
    <h4>© 2024 What-To-Do. All rights reserved.</h4>
  </footer>
</body>

</html>
